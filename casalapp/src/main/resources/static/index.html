<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ca$alApp - Transações</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        input, select, button { margin: 5px 0; padding: 8px; }
    </style>
</head>
<body>

    <h1>Transações</h1>

    <h2>Lista</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Descrição</th>
                <th>Valor</th>
                <th>Tipo</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="lista"></tbody>
    </table>
    <button onclick="carregar()">Atualizar</button>

    <h2>Nova transação</h2>
    <input id="descricao" placeholder="Descrição"><br>
    <input id="valor" type="number" step="0.01" placeholder="Valor"><br>
    <select id="tipo">
        <option value="receita">receita</option>
        <option value="despesa">despesa</option>
    </select><br>
    <button onclick="criar()">Criar</button>

    <script>
        async function carregar() {
            const resposta = await fetch("/find-all-transactions");
            const transacoes = await resposta.json();
            const lista = document.getElementById("lista");
            lista.innerHTML = "";

            for (const t of transacoes) {
                lista.innerHTML += `
                    <tr>
                        <td>${t.id}</td>
                        <td>${t.descricao}</td>
                        <td>R$ ${t.valor}</td>
                        <td>${t.tipo}</td>
                        <td><button onclick="excluir(${t.id})">Excluir</button></td>
                    </tr>
                `;
            }
        }

        async function criar() {
            const transacao = {
                descricao: document.getElementById("descricao").value,
                valor: Number(document.getElementById("valor").value),
                tipo: document.getElementById("tipo").value
            };

            await fetch("/create-transaction", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(transacao)
            });

            document.getElementById("descricao").value = "";
            document.getElementById("valor").value = "";
            carregar();
        }

        async function excluir(id) {
            await fetch("/delete-transaction/" + id, { method: "DELETE" });
            carregar();
        }

        carregar();
    </script>

</body>
</html>
